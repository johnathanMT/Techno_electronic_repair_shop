<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TECHNO MYO THANT</title>
  <meta name="description" content="Sign in or create an account to track your repairs and orders." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            maroon: { DEFAULT: "#800000", light: "#A62828", dark: "#5C0000" },
            gold: { DEFAULT: "#CFB53B", light: "#E0CB5E", dark: "#A8912A" },
            metal: { DEFAULT: "#1A1A1D", light: "#242428", 700: "#2E2E33", dark: "#141416" },
          },
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <!-- my css -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-metal text-gray-200">

  <!-- navbar -->
  <header class="fixed top-0 inset-x-0 z-50 bg-metal-dark/95 backdrop-blur border-b border-metal-700">
    <nav class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-2">
        <span class="w-9 h-9 rounded-lg bg-gold text-metal font-black flex items-center justify-center">T</span>
        <span class="font-extrabold text-white text-lg">TECHNO <span class="text-gold">MYO THANT</span></span>
      </a>
      <ul class="hidden md:flex items-center gap-6 text-sm font-semibold">
        <li><a href="index.html" class="text-gray-300 hover:text-gold transition-all duration-300">Home</a></li>
        <li><a href="service.html" class="text-gray-300 hover:text-gold transition-all duration-300">Services</a></li>
        <li><a href="sale-items.html" class="text-gray-300 hover:text-gold transition-all duration-300">Sale Items</a>
        </li>
        <li><a href="repair-guide.html" class="text-gray-300 hover:text-gold transition-all duration-300">Repair
            Guide</a></li>
        <!-- cart + login added by js -->
        <li id="navActions" class="flex items-center gap-4"></li>
      </ul>
      <button id="hamburger" class="md:hidden w-10 h-10 flex items-center justify-center text-white"
        aria-label="Toggle menu" aria-expanded="false">
        <svg id="icon-open" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" stroke-width="2"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </nav>
    <div id="mobileMenu" class="hidden md:hidden bg-metal-dark border-t border-metal-700 px-4 py-3 space-y-1">
      <a href="index.html" class="block py-2 text-gray-300 hover:text-gold">Home</a>
      <a href="service.html" class="block py-2 text-gray-300 hover:text-gold">Services</a>
      <a href="sale-items.html" class="block py-2 text-gray-300 hover:text-gold">Sale Items</a>
      <a href="repair-guide.html" class="block py-2 text-gray-300 hover:text-gold">Repair Guide</a>
      <div id="navActionsMobile"></div>
    </div>
  </header>

  <!-- auth box -->
  <main class="min-h-screen flex items-center justify-center px-4 pt-24 pb-16">
    <div class="w-full max-w-md bg-metal-light border border-metal-700 rounded-2xl p-6 sm:p-8">

      <div class="text-center mb-6">
        <span
          class="inline-flex w-12 h-12 rounded-xl bg-gold text-metal font-black text-xl items-center justify-center mb-3">T</span>
        <h1 class="text-2xl font-extrabold text-white">Customer Portal</h1>
        <p class="text-sm text-gray-400 mt-1">Sign in to track your repairs and orders.</p>
      </div>

      <!-- login/register tabs -->
      <div class="flex bg-metal rounded-lg p-1 mb-6">
        <button data-auth="login"
          class="auth-tab flex-1 py-2 rounded-md font-bold bg-gold text-metal transition-all duration-300">Login</button>
        <button data-auth="register"
          class="auth-tab flex-1 py-2 rounded-md font-bold text-gray-300 transition-all duration-300">Register</button>
      </div>

      <!-- login form -->
      <form id="loginForm" class="space-y-4">
        <div>
          <label for="loginEmail" class="block text-sm font-semibold text-gray-300 mb-1">Email or Phone</label>
          <input id="loginEmail" type="text" placeholder="you@email.com"
            class="w-full px-4 py-3 rounded-md bg-metal border border-metal-700 text-white focus:border-gold outline-none" />
        </div>
        <div>
          <label for="loginPassword" class="block text-sm font-semibold text-gray-300 mb-1">Password</label>
          <input id="loginPassword" type="password" placeholder="••••••••"
            class="w-full px-4 py-3 rounded-md bg-metal border border-metal-700 text-white focus:border-gold outline-none" />
        </div>
        <button type="submit"
          class="w-full bg-gold text-metal font-bold py-3 rounded-md hover:bg-gold-light transition-all duration-300">Sign
          In</button>
        <p class="text-xs text-gray-500 text-center">Demo only — any email &amp; password will sign you in.</p>
      </form>

      <!-- register form (hidden till clicked) -->
      <form id="registerForm" class="space-y-4 hidden">
        <div>
          <label for="regName" class="block text-sm font-semibold text-gray-300 mb-1">Full Name</label>
          <input id="regName" type="text" placeholder="Your name"
            class="w-full px-4 py-3 rounded-md bg-metal border border-metal-700 text-white focus:border-gold outline-none" />
        </div>
        <div>
          <label for="regEmail" class="block text-sm font-semibold text-gray-300 mb-1">Email or Phone</label>
          <input id="regEmail" type="text" placeholder="you@email.com"
            class="w-full px-4 py-3 rounded-md bg-metal border border-metal-700 text-white focus:border-gold outline-none" />
        </div>
        <div>
          <label for="regPassword" class="block text-sm font-semibold text-gray-300 mb-1">Password</label>
          <input id="regPassword" type="password" placeholder="Choose a password"
            class="w-full px-4 py-3 rounded-md bg-metal border border-metal-700 text-white focus:border-gold outline-none" />
        </div>
        <button type="submit"
          class="w-full bg-gold text-metal font-bold py-3 rounded-md hover:bg-gold-light transition-all duration-300">Create
          Account</button>
      </form>

    </div>
  </main>

  <script src="index.js"></script>
</body>

</html>
