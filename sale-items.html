<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sale Items — TECHNO MYO THANT</title>
  <meta name="description"
    content="Refurbished and second-hand TVs and monitors for sale. Filter by category. Prices in MMK." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            maroon: { DEFAULT: "#800000", light: "#A62828", dark: "#5C0000" },
            gold: { DEFAULT: "#CFB53B", light: "#E0CB5E", dark: "#A8912A" },
            metal: { DEFAULT: "#1A1A1D", light: "#242428", 700: "#2E2E33", dark: "#141416" },
          },
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <!-- my css -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-metal text-gray-200">

  <!-- navbar -->
  <header class="fixed top-0 inset-x-0 z-50 bg-metal-dark/95 backdrop-blur border-b border-metal-700">
    <nav class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-2">
        <span class="w-9 h-9 rounded-lg bg-gold text-metal font-black flex items-center justify-center">T</span>
        <span class="font-extrabold text-white text-lg">TECHNO <span class="text-gold">MYO THANT</span></span>
      </a>
      <ul class="hidden md:flex items-center gap-6 text-sm font-semibold">
        <li><a href="index.html" class="text-gray-300 hover:text-gold transition-all duration-300">Home</a></li>
        <li><a href="service.html" class="text-gray-300 hover:text-gold transition-all duration-300">Services</a></li>
        <li><a href="sale-items.html" class="text-gold">Sale Items</a></li>
        <li><a href="repair-guide.html" class="text-gray-300 hover:text-gold transition-all duration-300">Repair
            Guide</a></li>
        <li id="navActions" class="flex items-center gap-4"></li>
      </ul>
      <button id="hamburger" class="md:hidden w-10 h-10 flex items-center justify-center text-white"
        aria-label="Toggle menu" aria-expanded="false">
        <svg id="icon-open" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" stroke-width="2"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </nav>
    <div id="mobileMenu" class="hidden md:hidden bg-metal-dark border-t border-metal-700 px-4 py-3 space-y-1">
      <a href="index.html" class="block py-2 text-gray-300 hover:text-gold">Home</a>
      <a href="service.html" class="block py-2 text-gray-300 hover:text-gold">Services</a>
      <a href="sale-items.html" class="block py-2 text-gold font-semibold">Sale Items</a>
      <a href="repair-guide.html" class="block py-2 text-gray-300 hover:text-gold">Repair Guide</a>
      <div id="navActionsMobile"></div>
    </div>
  </header>

  <!-- page title -->
  <section class="pt-28 pb-8 px-4 text-center bg-gradient-to-br from-metal to-maroon-dark">
    <h1 class="text-4xl font-extrabold text-white">Items For Sale</h1>
    <p class="text-gray-300 mt-2">Refurbished & second-hand TVs and monitors. Prices in MMK.</p>
  </section>

  <!-- filter btns (js reads data-filter) -->
  <section class="px-4 pt-10">
    <div class="max-w-6xl mx-auto flex flex-wrap justify-center gap-3">
      <button data-filter="All" class="filter-btn bg-gold text-metal font-bold px-5 py-2 rounded-full">All</button>
      <button data-filter="TVs"
        class="filter-btn bg-metal-light text-gray-300 font-bold px-5 py-2 rounded-full hover:text-gold transition-all duration-300">TVs</button>
      <button data-filter="Monitors"
        class="filter-btn bg-metal-light text-gray-300 font-bold px-5 py-2 rounded-full hover:text-gold transition-all duration-300">Monitors</button>
    </div>
  </section>

  <!-- products load here from js -->
  <section class="px-4 py-10">
    <div id="productGrid" class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </section>

  <!-- footer -->
  <footer class="bg-metal-dark border-t border-metal-700 py-10 px-4 text-center">
    <p class="text-gray-400 text-sm">📍 No. 12, Tech Street, Yangon &nbsp;|&nbsp; 📞 +95 9 123 456 789</p>
    <p class="text-gray-500 text-sm mt-3">© 2026 TECHNO MYO THANT. All rights reserved.</p>
